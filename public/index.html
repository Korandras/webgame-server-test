<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Webgame Server Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Webgame Server Test</h1>

  <section class="box">
    <h2>Login</h2>

    <input id="usernameInput" type="text" placeholder="Benutzername">
    <input id="passwordInput" type="password" placeholder="Passwort">

    <button id="loginButton">Einloggen</button>
  </section>

  <section class="box">
    <h2>Server-Test</h2>

    <button id="statusButton">Serverstatus prüfen</button>
    <button id="socketButton">Socket-Nachricht senden</button>
  </section>

  <section class="box">
    <h2>Ausgabe</h2>
    <pre id="output">Noch keine Antwort vom Server.</pre>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
